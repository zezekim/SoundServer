play:
  name: Play sound
  description: Play a sound file from the library on one or more speakers.
  target:
    entity:
      integration: soundserver
      domain: media_player
  fields:
    sound:
      name: Sound
      description: The .wav file to play. Tip; browse the library from the media player card to see the full list.
      required: true
      example: detected_garage.wav
      selector:
        text:
    count:
      name: Repeat
      description: How many times to play it (1-20).
      default: 1
      selector:
        number:
          min: 1
          max: 20
          mode: box
    background:
      name: Background
      description: Optional background sound to mix underneath.
      example: sprinkler.wav
      selector:
        text:

speak:
  name: Speak text
  description: Convert text to speech and play it on one or more speakers.
  target:
    entity:
      integration: soundserver
      domain: media_player
  fields:
    text:
      name: Text
      description: What to say.
      required: true
      example: Someone is at the gate
      selector:
        text:
        multiline: true
    lang:
      name: Language
      description: gTTS language code.
      default: en
      example: en
      selector:
        text:
    background:
      name: Background
      description: Optional background sound to mix underneath.
      selector:
        text:

refresh_speakers:
  name: Refresh speakers
  description: Re-query the Sound Server for its speaker list (adds any newly-created speakers).
