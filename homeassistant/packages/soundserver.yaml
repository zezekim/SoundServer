# SoundServer — rest_command package (alternative to the custom integration).
#
# Use this if you'd rather not install a custom component. It gives you the same
# three actions as plain rest_command services.
#
# Setup:
#   1. In configuration.yaml, enable packages (once):
#        homeassistant:
#          packages: !include_dir_named packages
#   2. Copy this file to <config>/packages/soundserver.yaml
#   3. Change the host in the URLs below to your Pi.
#   4. Restart Home Assistant.
#
# Then call e.g. rest_command.soundserver_play with data:
#   { "sound": "detected_garage.wav", "speaker": "2,0" }

rest_command:
  soundserver_play:
    url: "http://10.0.14.50/sound/play/{{ speaker | default('2,0') }}/{{ sound }}/{{ count | default(1) }}{% if background is defined %}?background={{ background }}{% endif %}"
    method: GET

  soundserver_speak:
    url: "http://10.0.14.50/sound/api/speak"
    method: POST
    content_type: "application/json"
    payload: >-
      {"text": "{{ text }}", "speaker_id": "{{ speaker | default('2,0') }}",
       "lang": "{{ lang | default('en') }}"{% if background is defined %},
       "background_sound": "{{ background }}"{% endif %}}

  soundserver_set_volume:
    url: "http://10.0.14.50/sound/api/set_volume/{{ card }}/{{ control | default('Speaker') }}/{{ volume }}"
    method: POST
